version: "3.8"

services:
  qdrant-test:
    image: qdrant/qdrant:latest
    container_name: crag-qdrant-test
    ports:
      - "6334:6333"
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    volumes:
      - qdrant_test_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  qdrant_test_data:
    driver: local
